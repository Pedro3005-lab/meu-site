<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Botão do Caio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #mensagem {
      margin-top: 20px;
      font-size: 20px;
      color: green;
    }
  </style>
</head>
<body>

  <h1>Clique no botão</h1>
  <button onclick="mostrarMensagem()">Clique aqui</button>

  <div id="mensagem"></div>

  <script>
    function mostrarMensagem() {
      document.getElementById("mensagem").innerText = "Caio é gay";
    }
  </script>

</body>
</html>
